<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a1263"/>
      <stop offset="0.32" stop-color="#8e2a63"/>
      <stop offset="0.62" stop-color="#f4623a"/>
      <stop offset="0.82" stop-color="#ffab4c"/>
      <stop offset="1" stop-color="#ffd873"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffe9b0" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#ffd873" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ffab4c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sun" cx="50%" cy="42%" r="60%">
      <stop offset="0" stop-color="#fffbe9"/>
      <stop offset="0.45" stop-color="#ffe28a"/>
      <stop offset="0.8" stop-color="#ffb24c"/>
      <stop offset="1" stop-color="#ff8a3d"/>
    </radialGradient>
    <clipPath id="round">
